<section class="login">
  <h1>{{ 'login.title' | transloco }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <label>
      <span>{{ 'login.email' | transloco }}</span>
      <input type="email" formControlName="email" autocomplete="username" />
    </label>

    <label>
      <span>{{ 'login.password' | transloco }}</span>
      <input type="password" formControlName="password" autocomplete="current-password" />
    </label>

    @if (failed()) {
      <p class="error" role="alert">{{ 'login.error' | transloco }}</p>
    }

    <button type="submit" [disabled]="form.invalid">{{ 'login.submit' | transloco }}</button>
  </form>
</section>
