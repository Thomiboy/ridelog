<section class="login">
  <h1>{{ 'login.title' | transloco }}</h1>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <mat-form-field appearance="outline">
      <mat-label>{{ 'login.email' | transloco }}</mat-label>
      <input matInput type="email" formControlName="email" autocomplete="username" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>{{ 'login.password' | transloco }}</mat-label>
      <input matInput type="password" formControlName="password" autocomplete="current-password" />
    </mat-form-field>

    @if (failed()) {
      <p class="error" role="alert">{{ 'login.error' | transloco }}</p>
    }

    <button mat-flat-button type="submit" [disabled]="form.invalid">{{ 'login.submit' | transloco }}</button>
  </form>
</section>
